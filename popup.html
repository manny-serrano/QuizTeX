<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QuizTeX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1f3a; color: #e2e8f0; }
    .header { background: linear-gradient(135deg, #2d3561 0%, #1a1f3a 100%); padding: 16px 18px; border-bottom: 1px solid #2d3561; display: flex; align-items: center; gap: 10px; }
    .logo { width: 32px; height: 32px; background: linear-gradient(135deg, #4f8ef7, #a855f7); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .header-text h1 { font-size: 13px; font-weight: 700; color: #f0f4ff; }
    .header-text p { font-size: 10px; color: #7b8ab8; margin-top: 1px; }
    .status-card { margin: 14px; background: #242a4a; border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid #2d3561; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px #22c55e88; flex-shrink: 0; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .status-text { font-size: 12px; color: #a0aec0; }
    .status-text strong { color: #e2e8f0; display: block; font-size: 13px; margin-bottom: 1px; }
    .examples { margin: 0 14px 14px; background: #242a4a; border-radius: 10px; border: 1px solid #2d3561; overflow: hidden; }
    .examples-header { padding: 9px 14px; font-size: 11px; font-weight: 600; color: #7b8ab8; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #2d3561; }
    .example-row { padding: 8px 14px; border-bottom: 1px solid #2d356188; font-size: 11px; }
    .example-row:last-child { border-bottom: none; }
    .example-before { color: #7b8ab8; font-family: monospace; font-size: 10px; margin-bottom: 2px; word-break: break-all; }
    .example-after { color: #a3c4f3; font-weight: 600; }
    .footer { padding: 10px 14px; font-size: 10px; color: #4a5580; text-align: center; border-top: 1px solid #2d3561; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">∑</div>
    <div class="header-text">
      <h1>QuizTeX</h1>
      <p>Auto-renders math equations</p>
    </div>
  </div>
  <div class="status-card">
    <div class="status-dot"></div>
    <div class="status-text">
      <strong>Active on Quizlet</strong>
      LaTeX equations render automatically
    </div>
  </div>
  <div class="examples">
    <div class="examples-header">Supported formats</div>
    <div class="example-row">
      <div class="example-before">\( \mu_0 = 4\pi \times 10^{-7} \)</div>
      <div class="example-after">Rendered inline equation</div>
    </div>
    <div class="example-row">
      <div class="example-before">\[ E = mc^2 \]</div>
      <div class="example-after">Rendered display equation</div>
    </div>
    <div class="example-row">
      <div class="example-before">$\frac{a}{b}$ or $$...$$</div>
      <div class="example-after">Dollar sign syntax</div>
    </div>
  </div>
  <div class="footer">Powered by MathJax 3</div>
</body>
</html>
